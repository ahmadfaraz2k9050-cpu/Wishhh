  .bow:after{ right:0; transform:scaleX(-1) rotate(35deg) }
  .open .lid{ transform:translateY(-90px) rotate(-8deg) }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:20px }
  .overlay.show{ display:flex }
  .card{
    width:min(520px,92vw); background:var(--card); border-radius:18px; padding:26px; text-align:center;

  .nav{ display:flex; gap:10px; justify-content:center }
  .btn{ border:0; border-radius:999px; padding:10px 16px; background:var(--accent); color:#fff; cursor:pointer }
  .btn.alt{ background:#999 }
  .close{ position:absolute; top:10px; right:12px; background:transparent; color:#555; font-size:22px; border:0; cursor:pointer }

  /* Floating hearts */
  .heart{ position:fixed; bottom:-20px; font-size:18px; animation:float 6s linear infinite; opacity:.8 }
  @keyframes float{ to{ transform:translateY(-110vh) translateX(var(--drift)); opacity:0 } }
</style>
</head>

/* Gift */

  position:absolute;
  inset:40px 0 0 0;

.lid{
  position:absolute;
  top:0;
  left:0;

  transform:translateY(-90px) rotate(-10deg);

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);

.overlay.show{
  display:flex;
}

  background:#fff;
  width:90%;
  max-width:450px;
  padding:20px;
  border-radius:16px;
  text-align:center;
  animation:pop .4s ease;
}

@keyframes pop{
  from{transform:scale(.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

.card img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;

  color:#c2185b;

  color:#333;

    <div class="box"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="title"></h2>
    <img id="img" style="display:none"/>
    <p id="text"></p>

    <div class="nav">
      <button class="btn alt" id="prev">Prev</button>
      <button class="btn" id="next">Next</button>
    </div>
  </div>
</div>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const cards = [
  {
    title:"My Biggest Strength 💙",
    text:"You are my guide and support.",
    img:""
  },
  {
    title:"My Role Model 🌟",
    text:"You inspire me every day.",
    img:""
  },
  {
    title:"A Prayer ✨",
    text:"May Allah bless you always.",
    img:""
  },
  {
    title:"Memories 😄",
    text:"Every moment with you is special.",
    img:""
  },
  {
    title:"From My Heart ❤️",
    text:"You are my world.",
    img:""
  }
];

let i = 0;

const gift = document.getElementById("gift");
const overlay = document.getElementById("overlay");
const title = document.getElementById("title");
const text = document.getElementById("text");
const img = document.getElementById("img");

function show(){
  title.textContent = cards[i].title;
  text.textContent = cards[i].text;

  if(cards[i].img){
    img.src = cards[i].img;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }
}

gift.onclick = () => {
  gift.classList.add("open");
  overlay.classList.add("show");
  i = 0;
  show();

  confetti({ particleCount: 120, spread: 80, origin:{y:0.6} });

  for(let k=0;k<15;k++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.className="heart";
      h.textContent="💖";
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    },k*200);
  }
};

document.getElementById("next").onclick = () => {
  if(i < cards.length-1){
    i++;
    show();
  } else {
    overlay.classList.remove("show");
  }
};

document.getElementById("prev").onclick = () => {
  if(i > 0){
    i--;
    show();
  }
};
</script>
