<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Someone Special 🎁</title>
<style>
  :root{--bg1:#ffe3ec;--bg2:#fff6fb;--accent:#ff4d8d;--accent2:#ff9ac1;--card:#ffffff}
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--bg1),var(--bg2)); overflow:hidden;
  }
  .container{ text-align:center; padding:24px; }
  h1{ margin:0 0 10px; color:#c2185b; font-size:2rem }
  p.sub{ margin:0 0 22px; color:#7a1b4a }

  /* Gift box */
  .gift-wrap{ position:relative; width:160px; height:160px; margin:30px auto; cursor:pointer }
  .box{ position:absolute; inset:40px 0 0 0; background:var(--accent); border-radius:12px; box-shadow:0 12px 24px rgba(0,0,0,.15) }
  .lid{ position:absolute; top:0; left:0; right:0; height:60px; background:var(--accent2); border-radius:12px; transition:transform .6s ease }
  .ribbon-v, .ribbon-h{ position:absolute; background:#fff }
  .ribbon-v{ width:18px; left:calc(50% - 9px); top:0; bottom:0 }
  .ribbon-h{ height:18px; left:0; right:0; top:70px }
  .bow{ position:absolute; top:18px; left:50%; transform:translateX(-50%); width:70px; height:30px }
  .bow:before,.bow:after{ content:""; position:absolute; width:34px; height:26px; background:#fff; border-radius:50px 50px 0 50px }
  .bow:before{ left:0; transform:rotate(35deg) }
  .bow:after{ right:0; transform:scaleX(-1) rotate(35deg) }
  .open .lid{ transform:translateY(-90px) rotate(-8deg) }

  /* Modal */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:20px }
  .overlay.show{ display:flex }
  .card{
    width:min(520px,92vw); background:var(--card); border-radius:18px; padding:26px; text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.25); position:relative; animation:pop .35s ease
  }
  @keyframes pop{ from{ transform:scale(.9); opacity:.6 } to{ transform:scale(1); opacity:1 } }
  .card h2{ margin:0 0 12px; color:#c2185b }
  .card p{ margin:0 0 18px; line-height:1.6; color:#333 }
  .nav{ display:flex; gap:10px; justify-content:center }
  .btn{ border:0; border-radius:999px; padding:10px 16px; background:var(--accent); color:#fff; cursor:pointer }
  .btn.alt{ background:#999 }
  .close{ position:absolute; top:10px; right:12px; background:transparent; color:#555; font-size:22px; border:0; cursor:pointer }

  /* Floating hearts */
  .heart{ position:fixed; bottom:-20px; font-size:18px; animation:float 6s linear infinite; opacity:.8 }
  @keyframes float{ to{ transform:translateY(-110vh) translateX(var(--drift)); opacity:0 } }
</style>
</head>
<body>
  <div class="container">
    <h1>Happy Birthday <span id="name">VEERA</span> 💖</h1>
    <p class="sub">I made a little surprise for you…tap the gift 🎁</p>

    <div id="gift" class="gift-wrap" title="Tap to open">
      <div class="lid"></div>
      <div class="box"></div>
      <div class="ribbon-v"></div>
      <div class="ribbon-h"></div>
      <div class="bow"></div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="card">
      <button class="close" id="close">×</button>
      <h2 id="cardTitle">Card 1</h2>
      <p id="cardText"></p>
      <div class="nav">
        <button class="btn alt" id="prev">Previous</button>
        <button class="btn" id="next">Next</button>
      </div>
    </div>
  </div>

<script>
  // === EDIT THESE MESSAGES ===
  const cards = [
  {
    title: 'My Biggest Strength 💙',
    text:'You are not just my elder brother — you are my guide, my protector, and my biggest support. No matter what happens, I know I can always count on you. You truly mean the world to me.'
  },

  {
    title: 'My Role Model 🌟',
    text:'I’ve always looked up to you for your strength, wisdom, and kindness. You inspire me to become a better person every day. Having a brother like you is one of the greatest blessings in my life.'
  },

  {
    title: 'A Prayer For You ✨',
    text:'I pray that Allah blesses you with endless happiness, success, and good health. May your life always be filled with peace, love, and countless moments of joy.'
  },

  {
    title: 'Memories Together 😄',
    text:'From childhood memories to every little moment we’ve shared, you’ve made life more meaningful and fun. Thank you for always being there through every phase of my life.'
  },

  {
    title: 'From My Heart ❤️',
    text:'You are my whole world, my safe place, and one of the most important people in my life. Stay happy, stay strong, and always keep shining — because you deserve nothing but the best.'
  }
];
  const gift = document.getElementById('gift');
  const overlay = document.getElementById('overlay');
  const titleEl = document.getElementById('cardTitle');
  const textEl = document.getElementById('cardText');
  const next = document.getElementById('next');
  const prev = document.getElementById('prev');
  const close = document.getElementById('close');
  let i = 0;

  function showCard(idx){
    const c = cards[idx];
    titleEl.textContent = c.title;
    textEl.textContent = c.text;
    prev.disabled = idx===0;
    next.textContent = idx===cards.length-1 ? 'Finish' : 'Next';
  }

  gift.addEventListener('click',()=>{
    gift.classList.add('open');
    overlay.classList.add('show');
    i=0; showCard(i);
    startHearts();
  });
  close.addEventListener('click',()=> overlay.classList.remove('show'));
  next.addEventListener('click',()=>{
    if(i<cards.length-1){ i++; showCard(i); }
    else overlay.classList.remove('show');
  });
  prev.addEventListener('click',()=>{ if(i>0){ i--; showCard(i);} });

  // floating hearts
  function startHearts(){
    for(let k=0;k<24;k++) setTimeout(spawn, k*250);
  }
  function spawn(){
    const h=document.createElement('div');
    h.className='heart';
    h.textContent='💗';
    const left=Math.random()*100;
    const drift=(Math.random()*120-60)+'px';
    h.style.left=left+'vw';
    h.style.setProperty('--drift',drift);
    h.style.animationDuration=(5+Math.random()*3)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  }
</script>
</body>

</html>
